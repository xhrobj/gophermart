name: (-_-) GO CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go-ci:
    name: Quality checks -> lint, build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: (^_^) Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11

      - name: (^_^) Build gophermart
        run: make build

      - name: (^_^) Run tests
        run: go test -race ./...

      - name: (^_^) SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
